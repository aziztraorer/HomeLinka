<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>testclavier</title>
</head>
<body>
   <table border="1px solid ">
    <tr>
        <td class="Esc">Esc</td>
        <td class="F1">F1</td>
        <td class="F2">F2</td>
        <td class="F3">F3</td>
        <td class="F4">F4</td>
        <td class="F5">F5</td>
        <td class="F6">F6</td>
        <td class="F7">F7</td>
        <td class="F8">F8</td>
        <td class="F9">F9</td>
        <td class="F10">F10</td>
        <td class="F11">F11</td>
        <td class="F12">F12</td>
        <td class="R_Sist">R Sist</td>
        <td class="Fine_Stamp">Fine <br>Stamp</td>
        <td class="Insert_Pause">Insert <br>pause </td>
        <td class="Canc">Canc</td>
    </tr>
    <tr>
        <td class="²">²</td>
        <td class="1">1</td>
        <td class="2">2</td>
        <td class="3">3</td>
        <td class="4">4</td>
        <td class="5">5</td>
        <td class="6">6</td>
        <td class="7">7</td>
        <td class="8">8</td>
        <td class="9">9</td>
        <td class="0">0</td>
        <td class=""></td>
        <td class="=">=</td>
        <td class="supp" colspan="2">supp</td>
    </tr>
    <tr>
        <td class="TAB" colspan="2">TAB</td>
        <td class="A">A</td>
        <td class="Z">Z</td>
        <td class="E">E</td>
        <td class="R">R</td>
        <td class="T">T</td>
        <td class="Y">Y</td>
        <td class="U">U</td>
        <td class="I">I</td>
        <td class="O">O</td>
        <td class="P">P</td>
        <td class="^^">^^</td>
        <td class="£">£ <br> $</td>
        <td class="ENTRER" colspan="4">ENTRER</td>
    </tr>
    <tr>
        <td class="lock">lock</td>
        <td class="Q">Q</td>
        <td class="S">S</td>
        <td class="D">D</td>
        <td class="F">F</td>
        <td class="G">G</td>
        <td class="H">H</td>
        <td class="J">J</td>
        <td class="K">K</td>
        <td class="L">L</td>
        <td class="M">M</td>
        <td class="%">%</td>
        <td class="µ">µ</td>
        <td class="Shift" colspan="4">Shift</td>

    </tr>
    <tr>
        <td class="Shift">Shift</td>
        <td class="<"><</td>
        <td class="W">W</td>
        <td class="X">X</td>
        <td class="C">C</td>
        <td class="V">V</td>
        <td class="B">B</td>
        <td class="N">N</td>
        <td class=",">,</td>
        <td class=";">;</td>
        <td class=":">:</td>
        <td class="/">/</td>
        <td class="PAGUP">PAG UP</td>
        <td class="UP">UP</td>
        <td class="PAG">PAG DOWN</td>
    </tr>
    <tr>
        <td class="Ctrl">Ctrl</td>
        <td class="fn">fn</td>
        <td class="Win">Win</td>
        <td class="ALT">ALT</td>
        <td class="SPACE" colspan="7">SPACE</td>
        <td class="ALT">ALT</td>
        <td class="Win">Win</td>
        <td class="Ctrl">Ctrl</td>
        <td class="LEFT">LEFT</td>
        <td class="DOWN">DOWN</td>
        <td class="RIGHT">RIGHT</td>
    </tr>

   </table>

<script src="main.js"></script>
</body>
</html>
