<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: rgba(184, 119, 119, 0.356);
            overflow: hidden;
        }
        h1{
            font-size:30px;
            border: none;
            text-transform: uppercase;
            text-align: center;
            border-radius: 12px;
            color: red;
            box-shadow: 1px 0 30px 12px;
            animation: anni 2s ease;
        }
        @keyframes anni {
            from{
                transform:scale3d(1, 1, 1);
            }
            to{
                transform: scale3d(1.5, 1.5, 1);
            }
        }
    </style>
    <title>error</title>
</head>
<body>
    <div>
        <h1>error</h1>
        <p>page introuvable 😢</p>
    </div>
</body>
</html>
